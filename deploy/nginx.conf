# ═══════════════════════════════════════════════════════════════════
# GlobalAfrica+ — Nginx site config
# Path: /etc/nginx/sites-available/globalafricaplus.com
# ═══════════════════════════════════════════════════════════════════

# Redirect www → apex + HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name globalafricaplus.com www.globalafricaplus.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://globalafricaplus.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.globalafricaplus.com;

    ssl_certificate     /etc/letsencrypt/live/globalafricaplus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globalafricaplus.com/privkey.pem;

    return 301 https://globalafricaplus.com$request_uri;
}

# Main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name globalafricaplus.com;

    root /var/www/globalafricaplus.com/current/public;
    index index.php;

    # ─── SSL (Certbot) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/globalafricaplus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globalafricaplus.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security headers ─────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Upload / limits ──────────────────────────────
    client_max_body_size 20M;
    client_body_timeout 60s;

    charset utf-8;

    # ─── Logs ─────────────────────────────────────────
    access_log /var/log/nginx/globalafricaplus.access.log;
    error_log  /var/log/nginx/globalafricaplus.error.log;

    # ─── Static assets (long cache) ───────────────────
    location /build/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /brand/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico|woff|woff2|ttf|eot|otf)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ─── Hidden files & sensitive extensions ──────────
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~* \.(env|htaccess|log|sql|md|lock)$ {
        deny all;
    }

    # ─── Laravel front controller ─────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ─── PHP-FPM ──────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_read_timeout 120;
    }

    # ─── Gzip ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss image/svg+xml;
}
